<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  *{
    font-size: 40px;

  }

  h1{
    color: Red;
  }

  h1:hover{
    background-color: black;
  }

  .phone{
    color: green;
  }
  .phone:hover{
    background-color: rgb(1, 130, 1);
    color: white;
    padding: 10px 10px;
    margin-top: 15px;
    margin-bottom: 25px;
    border-radius: 20px;
    font-weight: bold;
  }

  #email{
    color: rgb(9, 9, 255);
  }

  p[draggable]{
    font-size: 20px;
    font-family: 'Courier New', Courier, monospace;
  }

  p[draggable="false"]{
    font-family: Arial, Helvetica, sans-serif;
  }
  
</style>
<body>
  <h1>Contact Me</h1>
  <p class="phone">Tel: +977 1234567890</p>
  <p id="email"; draggable="false">Email: me@gmail.com</p>
  <p draggable="true">Address:</p>
  <p draggable="false">
    Kathmandu, Nepal<br />
    Sukedhara<br />
    Nepal <br />
  </p>

</body>
</html>
